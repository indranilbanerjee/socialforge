<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --brand-primary: {{brand_primary}}; --brand-secondary: {{brand_secondary}}; --brand-accent: {{brand_accent}}; --brand-bg-light: {{brand_bg_light}}; --brand-bg-dark: {{brand_bg_dark}}; --brand-text: {{brand_text}}; --font-heading: '{{font_heading}}', sans-serif; --font-body: '{{font_body}}', sans-serif; }
  body { width: 1080px; height: 1080px; font-family: var(--font-body); background: var(--brand-bg-dark); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px; text-align: center; }
  .step-badge { width: 80px; height: 80px; border-radius: 50%; background: var(--brand-accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 32px; font-weight: 700; margin-bottom: 30px; }
  .step-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 16px; }
  h1 { font-family: var(--font-heading); font-size: 44px; margin-bottom: 24px; max-width: 800px; }
  p { font-size: 22px; line-height: 1.6; opacity: 0.85; max-width: 700px; }
  .slide-number { position: absolute; top: 20px; right: 20px; font-size: 13px; opacity: 0.4; }
  .logo { position: absolute; bottom: 20px; left: 30px; font-size: 14px; opacity: 0.4; font-family: var(--font-heading); }
</style></head><body>
  <div class="slide-number">{{slide_number}}</div>
  <div class="step-badge">{{slide_step}}</div>
  <div class="step-label">STEP {{slide_step}}</div>
  <h1>{{slide_title}}</h1>
  <p>{{slide_body}}</p>
  <div class="logo">{{brand_name}}</div>
</body></html>
